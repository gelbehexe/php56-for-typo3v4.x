stages:
  - build-test
  - deploy

variables:
  # Use the host docker socket
  DOCKER_HOST: unix:///var/run/docker.sock
  IMAGE_NAME: $DOCKERHUB_USERNAME/php56-for-typo3v4.x

build-and-test:
  stage: build-test
  image: docker:24.0.5
  before_script:
    - apk add --no-cache make bash
  script:
    - make build
    - make test
  variables:
    TYPO3_INITIAL_ADMIN_PASSWORD: "ci-test-password"
    TYPO3_INITIAL_ADMIN_USERNAME: "ci_admin"
    TYPO3_INITIAL_ADMIN_UID: "auto"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*$/
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

push-to-dockerhub:
  stage: deploy
  image: docker:24.0.5
  before_script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"
  script:
    - docker build -t "$IMAGE_NAME:latest" -t "$IMAGE_NAME:$CI_COMMIT_TAG" .
    - docker push "$IMAGE_NAME:latest"
    - docker push "$IMAGE_NAME:$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*$/
